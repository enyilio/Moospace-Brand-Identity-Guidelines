<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Moospace mark — Constellation">
  <title>Moospace — Constellation</title>
  <g transform="translate(100 100)">
    <!-- Constellation lines tracing ∞ -->
    <g fill="none" stroke="#F5C843" stroke-width="0.7" stroke-linecap="round" opacity="0.75">
      <path d="M -70,0 L -55,-18 L -35,-28 L -15,-20 L 0,0 L 20,-20 L 40,-28 L 55,-18 L 70,0 L 55,18 L 40,28 L 20,20 L 0,0 L -15,20 L -35,28 L -55,18 Z"/>
    </g>
    <!-- Stars -->
    <g fill="#F5C843">
      <circle cx="-70" cy="0" r="2.2"/>
      <circle cx="-55" cy="-18" r="1.3"/>
      <circle cx="-35" cy="-28" r="2.6"/>
      <circle cx="-15" cy="-20" r="1.3"/>
      <circle cx="0" cy="0" r="2.4"/>
      <circle cx="20" cy="-20" r="1.3"/>
      <circle cx="40" cy="-28" r="2.6"/>
      <circle cx="55" cy="-18" r="1.3"/>
      <circle cx="70" cy="0" r="2.2"/>
      <circle cx="55" cy="18" r="1.3"/>
      <circle cx="40" cy="28" r="2.6"/>
      <circle cx="20" cy="20" r="1.3"/>
      <circle cx="-15" cy="20" r="1.3"/>
      <circle cx="-35" cy="28" r="2.6"/>
      <circle cx="-55" cy="18" r="1.3"/>
    </g>
    <!-- Soft halos on major stars -->
    <g fill="#F5C843" opacity="0.3">
      <circle cx="-35" cy="-28" r="5"/>
      <circle cx="40" cy="-28" r="5"/>
      <circle cx="-35" cy="28" r="5"/>
      <circle cx="40" cy="28" r="5"/>
    </g>
  </g>
</svg>
