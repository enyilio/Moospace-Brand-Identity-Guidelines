<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Moospace mark — Sacred Infinity">
  <title>Moospace — Sacred Infinity</title>
  <g transform="translate(100 100)" fill="none" stroke="#F5C843" stroke-linejoin="round">
    <!-- Outer lemniscate -->
    <path d="M -72,0 C -72,-34 -24,-34 0,0 C 24,34 72,34 72,0 C 72,-34 24,-34 0,0 C -24,34 -72,34 -72,0 Z" stroke-width="2.2"/>
    <!-- Inner lemniscate (lens echo) -->
    <path d="M -50,0 C -50,-22 -16,-22 0,0 C 16,22 50,22 50,0 C 50,-22 16,-22 0,0 C -16,22 -50,22 -50,0 Z" stroke-width="0.9" opacity="0.55"/>
    <!-- Seed-of-life petals left cluster -->
    <circle cx="-40" cy="0" r="22" stroke-width="0.8" opacity="0.45"/>
    <circle cx="-30" cy="-14" r="14" stroke-width="0.7" opacity="0.35"/>
    <circle cx="-30" cy="14" r="14" stroke-width="0.7" opacity="0.35"/>
    <!-- Seed-of-life petals right cluster -->
    <circle cx="40" cy="0" r="22" stroke-width="0.8" opacity="0.45"/>
    <circle cx="30" cy="-14" r="14" stroke-width="0.7" opacity="0.35"/>
    <circle cx="30" cy="14" r="14" stroke-width="0.7" opacity="0.35"/>
    <!-- Vesica piscis at center -->
    <circle cx="-10" cy="0" r="14" stroke-width="0.7" opacity="0.4"/>
    <circle cx="10" cy="0" r="14" stroke-width="0.7" opacity="0.4"/>
  </g>
  <!-- Accent dots -->
  <g fill="#F5C843">
    <circle cx="28" cy="100" r="2"/>
    <circle cx="172" cy="100" r="2"/>
    <circle cx="100" cy="100" r="1.8"/>
  </g>
</svg>
