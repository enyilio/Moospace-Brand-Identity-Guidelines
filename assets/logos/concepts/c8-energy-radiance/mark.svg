<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Moospace mark — Energy Radiance">
  <title>Moospace — Energy Radiance</title>
  <defs>
    <radialGradient id="c8-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5C843" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#F5C843" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F5C843" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#c8-aura)"/>
  <g transform="translate(100 100)">
    <!-- Radial rays (24 at 15° intervals) -->
    <g stroke="#F5C843" stroke-width="0.7" stroke-linecap="round" opacity="0.55">
      <line x1="0" y1="-90" x2="0" y2="-74"/>
      <g transform="rotate(15)"><line x1="0" y1="-88" x2="0" y2="-78"/></g>
      <g transform="rotate(30)"><line x1="0" y1="-90" x2="0" y2="-74"/></g>
      <g transform="rotate(45)"><line x1="0" y1="-88" x2="0" y2="-78"/></g>
      <g transform="rotate(60)"><line x1="0" y1="-90" x2="0" y2="-74"/></g>
      <g transform="rotate(75)"><line x1="0" y1="-88" x2="0" y2="-78"/></g>
      <g transform="rotate(90)"><line x1="0" y1="-90" x2="0" y2="-74"/></g>
      <g transform="rotate(105)"><line x1="0" y1="-88" x2="0" y2="-78"/></g>
      <g transform="rotate(120)"><line x1="0" y1="-90" x2="0" y2="-74"/></g>
      <g transform="rotate(135)"><line x1="0" y1="-88" x2="0" y2="-78"/></g>
      <g transform="rotate(150)"><line x1="0" y1="-90" x2="0" y2="-74"/></g>
      <g transform="rotate(165)"><line x1="0" y1="-88" x2="0" y2="-78"/></g>
      <g transform="rotate(180)"><line x1="0" y1="-90" x2="0" y2="-74"/></g>
      <g transform="rotate(195)"><line x1="0" y1="-88" x2="0" y2="-78"/></g>
      <g transform="rotate(210)"><line x1="0" y1="-90" x2="0" y2="-74"/></g>
      <g transform="rotate(225)"><line x1="0" y1="-88" x2="0" y2="-78"/></g>
      <g transform="rotate(240)"><line x1="0" y1="-90" x2="0" y2="-74"/></g>
      <g transform="rotate(255)"><line x1="0" y1="-88" x2="0" y2="-78"/></g>
      <g transform="rotate(270)"><line x1="0" y1="-90" x2="0" y2="-74"/></g>
      <g transform="rotate(285)"><line x1="0" y1="-88" x2="0" y2="-78"/></g>
      <g transform="rotate(300)"><line x1="0" y1="-90" x2="0" y2="-74"/></g>
      <g transform="rotate(315)"><line x1="0" y1="-88" x2="0" y2="-78"/></g>
      <g transform="rotate(330)"><line x1="0" y1="-90" x2="0" y2="-74"/></g>
      <g transform="rotate(345)"><line x1="0" y1="-88" x2="0" y2="-78"/></g>
    </g>
    <!-- Outer thin ring -->
    <circle cx="0" cy="0" r="66" fill="none" stroke="#F5C843" stroke-width="0.5" opacity="0.35"/>
    <!-- Central ∞ -->
    <path d="M -56,0 C -56,-26 -18,-26 0,0 C 18,26 56,26 56,0 C 56,-26 18,-26 0,0 C -18,26 -56,26 -56,0 Z"
          fill="none" stroke="#F5C843" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="2.2" fill="#F5C843"/>
  </g>
</svg>
