<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Moospace mark — Lunar Cycle">
  <title>Moospace — Lunar Cycle</title>
  <g transform="translate(100 100)">
    <!-- 左圓：虧凸月輪廓 -->
    <circle cx="-36" cy="0" r="38" fill="none" stroke="#F5C843" stroke-width="2.2"/>
    <!-- 右圓：盈凸月輪廓 -->
    <circle cx="36" cy="0" r="38" fill="none" stroke="#F5C843" stroke-width="2.2"/>
    <!-- 左圓右半亮面（朝中心），月相暗示 -->
    <path d="M -36,-38 A 38,38 0 0 1 -36,38 Z" fill="#F5C843" opacity="0.22"/>
    <!-- 右圓左半亮面（朝中心），月相暗示 -->
    <path d="M 36,-38 A 38,38 0 0 0 36,38 Z" fill="#F5C843" opacity="0.22"/>
    <!-- 中心交會點強調 -->
    <circle cx="0" cy="0" r="2.5" fill="#F5C843"/>
  </g>
</svg>
