<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 180" role="img" aria-label="Moospace logo — Stressed Infinity">
  <title>Moospace — Stressed Infinity (Horizontal)</title>
  <defs>
    <linearGradient id="goldSH" x1="0" y1="55" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FAE39B"/>
